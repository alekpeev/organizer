<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Майчин Органайзър">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FDE8F0">
  <meta name="application-name" content="Майчин Органайзър">
  <meta name="description" content="Всичко за бебето на едно място — ваксини, растеж, хранене, спомени и още.">
  <title>Майчин Органайзър</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FDF8F4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Splash screen докато се зарежда iframe */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(212,104,138,0.25);
      animation: pulse 2s ease infinite;
    }
    #splash h1 {
      font-size: 1.6rem;
      color: #D4688A;
      margin-top: 16px;
      font-weight: 600;
    }
    #splash p {
      color: #8A6B6B;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .dots { display: flex; gap: 6px; margin-top: 20px; }
    .dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #F2A7C3; animation: dot 1.2s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; background: #A8D8C8; }
    .dots span:nth-child(3) { animation-delay: 0.4s; background: #C4B5E8; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dot {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    /* iframe на цял екран */
    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* iOS safe area */
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: env(safe-area-inset-top); }
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <img src="icon-192.png" alt="Майчин Органайзър">
    <h1>Майчин Органайзър</h1>
    <p>Зарежда се...</p>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Apps Script iframe -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwUDssTmamQyK0g1Lz38JYmbWfASw6xLgmYdKqblvYHTj9b0RmB_Kib43lSq6GGGWiiNQ/exec"
    allow="camera;microphone"
  ></iframe>

  <script>
    // Скрий splash когато iframe зареди
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    frame.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('hide');
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }, 800);
    });

    // Fallback — скрий splash след 10 секунди дори ако load не се случи
    setTimeout(function() {
      if (splash.style.display !== 'none') {
        splash.classList.add('hide');
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    }, 10000);

    // Register Service Worker за PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>

</body>
</html>
