<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Майчин Органайзър">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FDE8F0">
  <meta name="application-name" content="Майчин Органайзър">
  <meta name="description" content="Всичко за бебето на едно място — ваксини, растеж, хранене, спомени и още.">
  <title>Майчин Органайзър</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: linear-gradient(160deg, #FDE8F0 0%, #FDF8F4 50%, #E0F5EF 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    img {
      width: 100px; height: 100px; border-radius: 24px;
      box-shadow: 0 4px 20px rgba(212,104,138,0.25);
      animation: pulse 2s ease infinite;
    }
    h1 { font-size: 1.6rem; color: #D4688A; margin-top: 16px; font-weight: 600; }
    p { color: #8A6B6B; font-size: 0.9rem; margin-top: 8px; }
    .dots { display: flex; gap: 6px; margin-top: 20px; }
    .dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #F2A7C3; animation: dot 1.2s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; background: #A8D8C8; }
    .dots span:nth-child(3) { animation-delay: 0.4s; background: #C4B5E8; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes dot { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; } 40% { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>

  <img src="icon-192.png" alt="Майчин Органайзър">
  <h1>Майчин Органайзър</h1>
  <p>Зарежда се...</p>
  <div class="dots"><span></span><span></span><span></span></div>

  <script>
    // Показваме красив splash и след 1.5 секунди пренасочваме към приложението
    setTimeout(function() {
      window.location.href = 'https://script.google.com/macros/s/AKfycbwUDssTmamQyK0g1Lz38JYmbWfASw6xLgmYdKqblvYHTj9b0RmB_Kib43lSq6GGGWiiNQ/exec';
    }, 1500);

    // Register Service Worker за PWA иконка
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>

</body>
</html>
