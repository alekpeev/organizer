<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Майчин Органайзър">
  <meta name="theme-color" content="#F2A7C3">
  <title>Майчин Органайзър</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FDF8F4;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* Splash екран */
    #splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #FDF8F4 0%, #FFE8F0 50%, #F0FFF0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    #splash h1 {
      font-size: 22px;
      color: #D4627A;
      font-weight: 600;
    }
    #splash p {
      margin-top: 8px;
      font-size: 14px;
      color: #B0B0B0;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* iframe заема целия екран */
    #app-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Splash екран докато iframe зарежда -->
  <div id="splash">
    <img src="icon-192.png" alt="Лого">
    <h1>Майчин Органайзър</h1>
    <p>Зарежда се...</p>
  </div>

  <!-- Apps Script iframe — БЕЗ sandbox -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwUDssTmamQyK0g1Lz38JYmbWfASw6xLgmYdKqblvYHTj9b0RmB_Kib43lSq6GGGWiiNQ/exec"
    allow="camera;microphone"
  ></iframe>

  <script>
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');

    // Скрий splash когато iframe зареди
    frame.addEventListener('load', function() {
      setTimeout(function() {
        splash.classList.add('hide');
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }, 800);
    });

    // Fallback — скрий след 12 секунди
    setTimeout(function() {
      if (splash.style.display !== 'none') {
        splash.classList.add('hide');
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    }, 12000);

    // Service Worker за PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>

</body>
</html>
