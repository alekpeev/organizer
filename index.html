<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Майчин Органайзър">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FDE8F0">
  <meta name="application-name" content="Майчин Органайзър">
  <link rel="canonical" href="https://alekpeev.github.io/organizer/">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <title>Майчин Органайзър</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --pink:#F2A7C3;--pink-l:#FDE8F0;--pink-d:#D4688A;
      --cream:#FDF8F4;--mint:#A8D8C8;--mint-l:#E0F5EF;
      --lav:#C4B5E8;--lav-l:#EDE8FA;
      --text:#3D2B2B;--text-s:#8A6B6B;--text-xs:#B09898;
      --white:#fff;--green:#5CB878;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{
      min-height:100%;min-height:100dvh;
      font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--cream);color:var(--text);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    /* ---------- SPLASH / LOGIN ---------- */
    #splash{
      position:fixed;inset:0;
      background:linear-gradient(160deg,#FDE8F0,#FDF8F4 50%,#E0F5EF);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:50;padding:24px;overflow-y:auto;
      transition:opacity .4s,visibility .4s;
    }
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splash-icon{
      width:110px;height:110px;border-radius:26px;
      box-shadow:0 8px 32px rgba(212,104,138,.25);
      margin-bottom:20px;animation:pulse 2s ease-in-out infinite;
    }
    .splash-title{
      font-family:'Playfair Display',serif;
      font-size:1.8rem;color:var(--pink-d);
      text-align:center;line-height:1.2;
    }
    .splash-sub{
      color:var(--text-s);font-size:.95rem;
      margin-top:14px;text-align:center;
      padding:0 20px;max-width:380px;line-height:1.6;
    }
    .splash-dots{display:flex;gap:7px;margin-top:24px}
    .splash-dots span{
      width:9px;height:9px;border-radius:50%;
      background:var(--pink);
      animation:dot 1.2s ease infinite;
    }
    .splash-dots span:nth-child(2){animation-delay:.2s;background:var(--mint)}
    .splash-dots span:nth-child(3){animation-delay:.4s;background:var(--lav)}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    @keyframes dot{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.2);opacity:1}}

    .login-btn{
      display:none;margin-top:28px;
      background:linear-gradient(135deg,var(--pink),var(--pink-d));
      color:var(--white);border:none;
      padding:16px 40px;border-radius:16px;
      font-size:1.1rem;font-weight:600;cursor:pointer;
      box-shadow:0 6px 24px rgba(212,104,138,.35);
      font-family:'DM Sans',sans-serif;
      transition:transform .2s;
    }
    .login-btn:active{transform:scale(.96)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .login-note{
      display:none;font-size:.85rem;color:var(--text-s);
      margin-top:14px;line-height:1.5;text-align:center;
      padding:0 20px;max-width:380px;
    }
    .loading-msg{
      display:none;color:var(--pink-d);
      font-size:.95rem;margin-top:18px;
      text-align:center;font-weight:500;
    }
  </style>
</head>
<body>

<!-- ================ SPLASH / LOGIN ================ -->
<div id="splash">
  <img src="icon-192.png" alt="Лого" class="splash-icon">
  <div class="splash-title">Майчин<br>Органайзър</div>
  <div id="splash-sub" class="splash-sub">Зареждане...</div>
  <div id="splash-dots" class="splash-dots"><span></span><span></span><span></span></div>
  <button id="login-btn" class="login-btn">Вход с Google</button>
  <div id="login-note" class="login-note">
    Еднократно влизане. След това просто запази иконата на началния екран.
  </div>
  <div id="redirect-msg" class="loading-msg">Пренасочване към Google...</div>
</div>

<script>
(function(){
  'use strict';

  var GAS_URL = 'https://script.google.com/macros/s/AKfycbwUDssTmamQyK0g1Lz38JYmbWfASw6xLgmYdKqblvYHTj9b0RmB_Kib43lSq6GGGWiiNQ/exec';

  // URL normalization - винаги слагаме trailing slash и сме на правилния път
  (function normalizeUrl() {
    var path = window.location.pathname;
    if (path === '/organizer') {
      window.location.replace('/organizer/');
      return;
    }
    if (window.location.hostname === 'alekpeev.github.io' && path.indexOf('/organizer/') !== 0) {
      window.location.replace('https://alekpeev.github.io/organizer/');
      return;
    }
  })();

  // ---------- DOM ----------
  var splash = document.getElementById('splash');
  var splashSub = document.getElementById('splash-sub');
  var splashDots = document.getElementById('splash-dots');
  var loginBtn = document.getElementById('login-btn');
  var loginNote = document.getElementById('login-note');
  var redirectMsg = document.getElementById('redirect-msg');

  // ---------- Standalone detection ----------
  var isStandalone = (window.navigator.standalone === true) || window.matchMedia('(display-mode: standalone)').matches;

  // ============================================================
  // INIT - правим JSONP проверка веднага
  // Ако вече е логнат с разрешения → автоматично отваряме приложението
  // Ако не → показваме бутона "Вход с Google"
  // ============================================================
  checkAuth();

  function checkAuth() {
    var cbName = 'gasAuthCb_' + Math.round(Math.random() * 100000);
    var resolved = false;
    var script = document.createElement('script');

    splashSub.textContent = 'Проверка...';
    splashDots.style.display = 'flex';
    loginBtn.style.display = 'none';
    loginNote.style.display = 'none';
    redirectMsg.style.display = 'none';

    window[cbName] = function(data) {
      if (resolved) return;
      resolved = true;
      try { delete window[cbName]; } catch(e){}
      try { script.remove(); } catch(e){}

      if (data && data.email && data.hasAccess) {
        // Имаме достъп - директно отваряме приложението
        redirectToApp();
      } else {
        // Трябва login
        showLoginButton();
      }
    };

    script.onerror = function() {
      if (resolved) return;
      resolved = true;
      try { delete window[cbName]; } catch(e){}
      try { script.remove(); } catch(e){}
      showLoginButton();
    };

    setTimeout(function() {
      if (!resolved) {
        resolved = true;
        try { delete window[cbName]; } catch(e){}
        try { script.remove(); } catch(e){}
        showLoginButton();
      }
    }, 8000);

    script.src = GAS_URL + '?action=check_auth&callback=' + cbName + '&t=' + Date.now();
    document.body.appendChild(script);
  }

  // ============================================================
  // SHOW LOGIN BUTTON
  // ============================================================
  function showLoginButton() {
    splashDots.style.display = 'none';
    splashSub.textContent = 'Нужно е еднократно влизане';
    loginBtn.textContent = 'Вход с Google';
    loginBtn.disabled = false;
    loginBtn.style.display = 'block';
    loginNote.style.display = 'block';
    redirectMsg.style.display = 'none';
  }

  // ============================================================
  // LOGIN - FULL PAGE REDIRECT към чист GAS_URL (БЕЗ параметри!)
  // Apps Script ще покаже Google OAuth → ще даде разрешения →
  // → ще зареди приложението директно на script.google.com
  // ============================================================
  loginBtn.addEventListener('click', function() {
    loginBtn.disabled = true;
    loginBtn.style.display = 'none';
    loginNote.style.display = 'none';
    splashSub.textContent = '';
    splashDots.style.display = 'none';
    redirectMsg.style.display = 'block';

    setTimeout(function() {
      window.location.href = GAS_URL;
    }, 200);
  });

  // ============================================================
  // REDIRECT КЪМ ПРИЛОЖЕНИЕТО (когато има достъп)
  // ============================================================
  function redirectToApp() {
    splashSub.textContent = 'Зареждане на приложението...';
    splashDots.style.display = 'flex';
    loginBtn.style.display = 'none';
    loginNote.style.display = 'none';
    redirectMsg.style.display = 'none';

    setTimeout(function() {
      window.location.replace(GAS_URL);
    }, 200);
  }

  // ============================================================
  // SERVICE WORKER (за PWA capabilities)
  // ============================================================
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }
})();
</script>
</body>
</html>
