<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Майчин Органайзър">
  <meta name="theme-color" content="#F2A7C3">
  <title>Майчин Органайзър</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FDF8F4;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    #splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #FDF8F4 0%, #FFE8F0 50%, #F0FFF0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    #splash h1 {
      font-size: 22px;
      color: #D4627A;
      font-weight: 600;
    }
    #splash p {
      margin-top: 8px;
      font-size: 14px;
      color: #B0B0B0;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Auth overlay */
    #auth-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #FDF8F4 0%, #FFE8F0 50%, #F0FFF0 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 32px;
      text-align: center;
    }
    #auth-overlay img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    #auth-overlay h2 {
      font-size: 20px;
      color: #D4627A;
      margin-bottom: 12px;
    }
    #auth-overlay p {
      font-size: 15px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    #auth-overlay button {
      background: linear-gradient(135deg, #F2A7C3, #D4627A);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212,98,122,0.3);
    }
    #auth-overlay button:active {
      transform: scale(0.97);
    }
    #auth-overlay .auth-note {
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
    }

    #app-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="splash">
    <img src="icon-192.png" alt="Лого">
    <h1>Майчин Органайзър</h1>
    <p>Зарежда се...</p>
  </div>

  <div id="auth-overlay">
    <img src="icon-192.png" alt="Лого">
    <h2>Добре дошла!</h2>
    <p>За да използваш приложението, трябва да влезеш с Google акаунта си. Натисни бутона — ще се отвори нов прозорец за вход.</p>
    <button id="auth-btn">Вход с Google</button>
    <p class="auth-note">След като влезеш, върни се тук — приложението ще се зареди.</p>
  </div>

  <iframe id="app-frame" allow="camera;microphone"></iframe>

  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUDssTmamQyK0g1Lz38JYmbWfASw6xLgmYdKqblvYHTj9b0RmB_Kib43lSq6GGGWiiNQ/exec';
    var frame = document.getElementById('app-frame');
    var splash = document.getElementById('splash');
    var authOverlay = document.getElementById('auth-overlay');
    var authBtn = document.getElementById('auth-btn');
    var isAuthed = false;

    // JSONP callback — извиква се ако потребителят е логнат в Google
    function onAuthCheck(email) {
      isAuthed = true;
      loadApp();
    }

    function loadApp() {
      frame.src = SCRIPT_URL;

      frame.addEventListener('load', function() {
        setTimeout(function() {
          try {
            if (frame.contentWindow.length > 0) {
              hideSplash();
            } else {
              showAuthOverlay();
            }
          } catch(e) {
            // Cross-origin — нормално, скриваме splash
            hideSplash();
          }
        }, 2000);
      });

      setTimeout(function() {
        if (splash.style.display !== 'none') {
          hideSplash();
        }
      }, 15000);
    }

    function hideSplash() {
      splash.classList.add('hide');
      authOverlay.style.display = 'none';
      setTimeout(function() { splash.style.display = 'none'; }, 500);
    }

    function showAuthOverlay() {
      splash.style.display = 'none';
      authOverlay.style.display = 'flex';
    }

    // Бутон "Вход с Google"
    authBtn.addEventListener('click', function() {
      var authWindow = window.open(SCRIPT_URL, '_blank');

      authBtn.textContent = 'Чакам вход...';
      authBtn.disabled = true;

      var checkInterval = setInterval(function() {
        if (authWindow && authWindow.closed) {
          clearInterval(checkInterval);
          authOverlay.style.display = 'none';
          splash.style.display = 'flex';
          splash.classList.remove('hide');
          loadApp();
        }
      }, 500);

      setTimeout(function() {
        clearInterval(checkInterval);
        authBtn.textContent = 'Вход с Google';
        authBtn.disabled = false;
      }, 120000);
    });

    // СТЪПКА 1: JSONP проверка — логнат ли е потребителят?
    var scriptTag = document.createElement('script');
    scriptTag.src = SCRIPT_URL + '?jsonpCallback=onAuthCheck';
    scriptTag.onerror = function() {
      showAuthOverlay();
    };
    document.body.appendChild(scriptTag);

    // Fallback — ако след 6 сек няма отговор
    setTimeout(function() {
      if (!isAuthed) {
        showAuthOverlay();
      }
    }, 6000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>

</body>
</html>
